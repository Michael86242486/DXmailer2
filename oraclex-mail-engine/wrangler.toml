name = "oraclex-api"
main = "worker.js"
compatibility_date = "2024-09-01"
compatibility_flags = ["nodejs_compat"]

[[rules]]
type = "Text"
globs = ["**/*.hbs"]
fallthrough = true

[[d1_databases]]
binding = "DB"
database_name = "oraclex-db"
database_id = "will-be-generated"

[[queues.producers]]
binding = "EMAIL_QUEUE"
queue = "email-queue"

[[queues.consumers]]
queue = "email-queue"
max_batch_size = 10
max_batch_timeout = 5
max_retries = 3
dead_letter_queue = "email-dlq"

[triggers]
crons = ["0 0 * * *"]
