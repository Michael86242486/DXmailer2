kind = "web"
previewPath = "/"
title = "ORACLEX Dashboard"
version = "1.0.0"
id = "artifacts/oraclex-ui"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18399

[services.development]
run = "pnpm --filter @workspace/oraclex-ui run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/oraclex-ui", "run", "build" ]
publicDir = "artifacts/oraclex-ui/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18399"
BASE_PATH = "/"
